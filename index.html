<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Horloge Analogique + Numérique</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <header>
      <h1>Horloge Analogique + Numérique</h1>
      <p>Temps local : <span id="localNow">--:--:--</span></p>
    </header>

    <div class="controls">
      <select id="tzSelect"></select>
      <button id="addTz">+ Ajouter</button>
      
      <!-- NOUVEAU : Checkboxes pour choisir l'affichage -->
      <label style="display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" id="showAnalog" checked> Analogique
      </label>
      <label style="display: flex; align-items: center; gap: 5px;">
        <input type="checkbox" id="showDigital" checked> Numérique
      </label>
      
      <select id="hourFormat">
        <option value="24">24h</option>
        <option value="12">12h</option>
      </select>
    </div>

    <main id="clocks"></main>

    <footer>
      <p>Made by Ahmed Kahouli</p>
    </footer>
  </div>
  <script src="script.js"></script>
</body>
</html>
